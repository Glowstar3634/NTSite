<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Nova Travis</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="loading">
  <canvas id="field"></canvas>

  <div id="space-ui">
    <section id="homeScene" class="scene home-scene active">
      <button class="corner-link top-left space-object" data-page="about" data-depth="16">
        About
      </button>

      <button class="corner-link top-right space-object" data-page="projects" data-depth="16">
        Projects
      </button>

      <button class="corner-link bottom-left space-object" data-page="writing" data-depth="16">
        Writing
      </button>

      <button class="corner-link bottom-right space-object" data-page="math" data-depth="16">
        Math Notes
      </button>

      <div class="identity space-object" data-depth="7">
        <h1>NOVA</h1>
        <p>TRAVIS</p>
      </div>
    </section>

    <section id="pageScene" class="scene page-scene">
      <button id="backButton" class="back-button space-object" data-depth="14">
        ← Back
      </button>

      <article class="page-content space-object" data-depth="8">
        <p id="pageKicker" class="page-kicker"></p>
        <h2 id="pageTitle"></h2>
        <div id="pageBody"></div>
      </article>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
